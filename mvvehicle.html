<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Downloading MTVehicles.jar...</title>
</head>
<body>
  <script>
    // Path to your JAR file
    const fileUrl = "MTVehicles.jar";
    const fileName = "MTVehicles.jar";

    // Create a hidden link
    const link = document.createElement("a");
    link.href = fileUrl;
    link.download = fileName;

    // Trigger the download
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  </script>

  <p>If the download doesn’t start automatically, 
     <a href="MTVehicles.jar" download="MTVehicles.jar">click here</a>.
  </p>
</body>
</html>
